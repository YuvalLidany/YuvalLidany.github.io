{% include base_path %}

<!-- start custom head snippets -->

<!-- Favicon: "YL" monogram (SVG) with .ico fallback -->
<link rel="icon" type="image/svg+xml" href="/images/favicon.svg">
<link rel="alternate icon" type="image/x-icon" href="/images/favicon.ico">
<link rel="apple-touch-icon" href="/images/favicon.svg">
<link rel="mask-icon" href="{{ base_path }}/images/safari-pinned-tab.svg" color="#1f5c93">
<meta name="theme-color" content="#1f5c93">

<!-- Social share preview image (LinkedIn/X/Facebook) -->
<meta property="og:image" content="{{ site.url }}/images/profile.png">
<meta name="twitter:image" content="{{ site.url }}/images/profile.png">
<meta name="twitter:card" content="summary">
<link rel="stylesheet" href="{{ base_path }}/assets/css/academicons.css"/>

<!-- Inter web font for a cleaner, more modern look -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Source+Serif+4:opsz,wght@8..60,400;8..60,600;8..60,700&display=swap" rel="stylesheet">


<!-- Support for MatJax -->
<script src="https://cdnjs.cloudflare.com/polyfill/v3/polyfill.min.js?features=es6"></script>
<script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

<!-- Google Scholar citation metadata (only emitted on pages that set citation_title in their front matter) -->
{% if page.citation_title %}
<meta name="citation_title" content="{{ page.citation_title }}">
{% for author in page.citation_authors %}
<meta name="citation_author" content="{{ author }}">
{% endfor %}
{% if page.citation_publication_date %}<meta name="citation_publication_date" content="{{ page.citation_publication_date }}">{% endif %}
{% if page.citation_journal_title %}<meta name="citation_journal_title" content="{{ page.citation_journal_title }}">{% endif %}
{% if page.citation_pdf_url %}<meta name="citation_pdf_url" content="{{ page.citation_pdf_url }}">{% endif %}
{% endif %}

<!-- Structured data: identify this site as the person Yuval Lidany (homepage only) -->
{% if page.url == "/" %}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "Person",
  "name": "Yuval Lidany",
  "url": "https://yuvallidany.github.io",
  "image": "https://yuvallidany.github.io/images/profile.png",
  "jobTitle": "Postdoctoral Fellow",
  "affiliation": { "@type": "Organization", "name": "Harvard Business School" },
  "alumniOf": { "@type": "CollegeOrUniversity", "name": "Boston College" },
  "knowsAbout": ["Industrial Organization", "Antitrust", "Empirical Economics"],
  "sameAs": [
    "https://www.linkedin.com/in/yuval-lidany-6638b4395/"
  ]
}
</script>
{% endif %}

<!-- end custom head snippets -->
